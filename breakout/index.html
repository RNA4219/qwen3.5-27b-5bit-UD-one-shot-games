<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Breakout - Qwen3.5 27B One-shot Demo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #gameContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas {
      border: 2px solid #fff;
      background: #000;
      image-rendering: pixelated;
    }
    .hint {
      font-size: 14px;
      opacity: 0.8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div class="hint">
      Move: ← / → &nbsp; | &nbsp; Start ball: Space
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
