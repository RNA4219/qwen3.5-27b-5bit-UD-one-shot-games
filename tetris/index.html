<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Canvas Tetris (from index.ts)</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: #111; color: #ddd; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #wrap { display: grid; gap: 10px; justify-items: center; }
    #hint { font-size: 14px; opacity: 0.9; }
    canvas { border: 1px solid #333; background: #000; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="hint">操作: ←/→ 移動, ↑ 回転, ↓ ソフトドロップ</div>
  </div>
  <script src="./index.js"></script>
</body>
</html>
