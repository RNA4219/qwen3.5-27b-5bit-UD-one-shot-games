<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Qwen3.5-27B Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- スタイル：ゲームセンター風＋ふよふよカード -->
    <style>
      :root {
        color-scheme: dark;
        --bg: #05030a;
        --bg-panel: rgba(6, 8, 20, 0.9);
        --accent: #36f0ff;
        --accent-soft: #7d5bff;
        --accent-strong: #ff2e92;
        --text: #f5f5ff;
        --text-sub: #a6a6c8;
        --border-soft: rgba(255, 255, 255, 0.12);
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: stretch;
        background:
          radial-gradient(
            circle at top,
            rgba(54, 240, 255, 0.18),
            transparent 50%
          ),
          radial-gradient(
            circle at bottom,
            rgba(255, 46, 146, 0.18),
            transparent 55%
          ),
          linear-gradient(145deg, #020008 0%, #05030a 40%, #020008 100%);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        position: relative;
        overflow: hidden;
      }

      .root {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      .scanline-overlay {
        pointer-events: none;
        position: fixed;
        inset: 0;
        background-image: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0.06) 1px,
          transparent 1px,
          transparent 3px
        );
        mix-blend-mode: soft-light;
        opacity: 0.2;
      }

      .wrapper {
        position: relative;
        z-index: 1;
        max-width: 1024px;
        width: 100%;
        padding: 32px 20px 40px;
        margin: auto;
      }

      .header {
        text-align: center;
        margin-bottom: 32px;
      }

      .title {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 34px);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-shadow:
          0 0 8px rgba(54, 240, 255, 0.7),
          0 0 18px rgba(125, 91, 255, 0.6);
      }

      .subtitle {
        margin: 0;
        font-size: 13px;
        line-height: 1.6;
        color: var(--text-sub);
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
      }

      .card {
        position: relative;
        padding: 18px 18px 16px;
        border-radius: 16px;
        background: var(--bg-panel);
        border: 1px solid var(--border-soft);
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.9),
          0 18px 45px rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow: hidden;
        transform-origin: center;
        animation: floatCard 3.8s ease-in-out infinite;
      }

      @keyframes floatCard {
        0% {
          transform: translateY(0px) translateZ(0);
        }
        50% {
          transform: translateY(-8px) translateZ(0);
        }
        100% {
          transform: translateY(0px) translateZ(0);
        }
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -1px;
        background: radial-gradient(
          circle at top left,
          rgba(54, 240, 255, 0.18),
          transparent 55%
        );
        opacity: 0.7;
        mix-blend-mode: screen;
        pointer-events: none;
      }

      .card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow:
          0 0 0 1px rgba(54, 240, 255, 0.4),
          0 22px 60px rgba(0, 0, 0, 1);
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .card-title {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .card-badge {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid rgba(54, 240, 255, 0.8);
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.16em;
        background: radial-gradient(
          circle at top,
          rgba(54, 240, 255, 0.26),
          transparent 60%
        );
      }

      .card-description {
        margin: 0;
        font-size: 13px;
        color: var(--text-sub);
        line-height: 1.6;
      }

      .card-meta {
        margin: 0;
        font-size: 11px;
        color: rgba(198, 198, 255, 0.86);
      }

      .card-footer {
        margin-top: 8px;
        display: flex;
        justify-content: flex-end;
      }

      .card-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 180px;
        padding: 10px 18px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background-image: radial-gradient(
            circle at 0% 0%,
            rgba(54, 240, 255, 0.45),
            transparent 55%
          ),
          radial-gradient(
            circle at 100% 100%,
            rgba(255, 46, 146, 0.45),
            transparent 55%
          ),
          linear-gradient(135deg, #151827, #050510);
        color: #ffffff;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-decoration: none;
        text-transform: uppercase;
        box-shadow:
          0 0 12px rgba(54, 240, 255, 0.45),
          0 0 20px rgba(255, 46, 146, 0.45);
        transition:
          transform 0.12s ease-out,
          box-shadow 0.12s ease-out,
          border-color 0.12s ease-out;
      }

      .card-button:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.7);
        box-shadow:
          0 0 18px rgba(54, 240, 255, 0.7),
          0 0 28px rgba(255, 46, 146, 0.7);
      }

      .button-label {
        font-weight: 600;
      }

      .button-icon {
        font-size: 13px;
      }

      @media (max-width: 600px) {
        .wrapper {
          padding: 20px 14px 26px;
        }

        .card {
          padding: 16px 14px 14px;
        }

        .card-button {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="root">
      <div class="scanline-overlay"></div>
      <div id="root"></div>
    </div>

    <!-- React & ReactDOM & Babel (CDN) -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React アプリ本体 -->
    <script type="text/babel">
      const games = [
        {
          id: "pong",
          title: "Pong",
          description:
            "左右のパドルでボールを打ち返すクラシックな Pong 風ゲーム。",
          meta: "Move: W / S & ↑ / ↓",
          href: "pong/",
        },
        {
          id: "breakout",
          title: "Breakout",
          description:
            "ブロックを壊してスコアを稼ぐブロック崩し。Space キーでボール発射。",
          meta: "Move: ← / →  |  Start: Space",
          href: "breakout/",
        },
        {
          id: "tetris",
          title: "Tetris",
          description: "テトリミノを積んでラインを消すテトリス風落ちものパズル。",
          meta: "Move: ← / →, Rotate: ↑, Soft drop: ↓",
          href: "tetris/",
        },
      ];

      const App = () => {
        return (
          <div className="wrapper">
            <header className="header">
              <h1 className="title">Qwen3.5-27B Arcade</h1>
              <p className="subtitle">
                Qwen3.5-27B-A3B 一発出しコードをほぼそのまま動かした
                <br />
                HTML5 Canvas ミニゲーム・アーケード。
              </p>
            </header>

            <main>
              <div className="card-grid">
                {games.map((game, index) => (
                  <article
                    key={game.id}
                    className="card"
                    style={{ animationDelay: `${index * 0.15}s` }}
                  >
                    <div className="card-header">
                      <h2 className="card-title">{game.title}</h2>
                      <span className="card-badge">PLAY</span>
                    </div>
                    <p className="card-description">{game.description}</p>
                    <p className="card-meta">{game.meta}</p>
                    <div className="card-footer">
                      <a className="card-button" href={game.href}>
                        <span className="button-label">START GAME</span>
                        <span className="button-icon">▶</span>
                      </a>
                    </div>
                  </article>
                ))}
              </div>
            </main>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
